<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vercel Edge Function Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    .test-section {
      margin: 20px 0;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .success {
      color: green;
    }
    .error {
      color: red;
    }
    pre {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 4px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>Vercel Edge Function Test</h1>
  
  <div class="test-section">
    <h2>测试 API</h2>
    <button onclick="testAPI()">测试 ttft-vercel-proxy</button>
    <div id="result"></div>
  </div>

  <script>
    async function testAPI() {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '<p>正在测试...</p>';
      
      try {
        const response = await fetch('/api/ttft-vercel-proxy', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            endpoint: 'https://httpbin.org/ip',
            apiKey: 'test-key',
            payload: {}
          })
        });
        
        const headers = {};
        response.headers.forEach((value, key) => {
          headers[key] = value;
        });
        
        resultDiv.innerHTML = `
          <p class="success">✅ API 工作正常！</p>
          <h3>响应头：</h3>
          <pre>${JSON.stringify(headers, null, 2)}</pre>
        `;
      } catch (error) {
        resultDiv.innerHTML = `
          <p class="error">❌ 错误：${error.message}</p>
        `;
      }
    }
  </script>
</body>
</html>
